<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>
    <form action="">
        <center>
            <h1>Forms</h1>
        <table cellpadding="5" cellspacing="5">
            <tr>
                <td>
                <label for="name">Enter your name</label>
                </td>
                <td>
                <input type="text" id="name" name="name" placeholder="enter your name">
                </td>
            </tr>
           
            <tr>
                <td>
                <label for="address">Address</label>
                </td>
                <td>
                <textarea name="adresss" id="adresss" placeholder="enter your address"></textarea>
                </td>
            </tr>
        <tr>
            <td>
                <label for="gender">Gender</label>
            </td>
        </tr>
        <tr>
            <td>
                <input type="radio" id="male" name="gender"><span>Male</span>
            </td>
            <td>
            <input type="radio" id="fmale" name="gender"><span>female</span>
            </td>
            <td>
            <input type="radio" id="ohter" name="gender"><span>other</span>
            </td>
        </tr>   
        <tr>
            <td>
                <label for="mail">E-mail</label>
                        
            </td>
            <td>
                <input type="email" id="mail" name="mail" placeholder="enter your eamil">
            </td>
        </tr>
        <tr>
            <td>
                <label for="tell">Phone Number</label>
            </td>
            <td>
                <input type="tel" id="tell" name="tell" placeholder="enter your Number" max="10">
            </td>
        </tr>
        <tr>
            <td>
                <label for="pass">Password</label>
            </td>
            <td>
                <input type="password" id="pass" name="pass" placeholder="Enter your password">
            </td>
        </tr>
      
        <tr>
            <td>
                <label for="date">Date of Birth</label>
            </td>
            <td>
                <input type="date" name="date" id="date">
            </td>
        </tr>
        <tr>
            <td>
                <label for="skills">Skill</label>
            </td>
        </tr>
        <tr>

            <td>
                <input type="checkbox" id="python" name="skill" ><span>Python</span>
            </td>
            <td>
                <input type="checkbox" id="c" name="skill" ><span>C</span>
            </td>
            <td>
                <input type="checkbox" id="Java" name="skill" ><span>JAva</span>
            </td>
            <td>
                <input type="checkbox" id="Javascript" name="skill" ><span>JAvascript</span>
            </td>
        </tr>
        <tr>
            <td>
            <label for="studies">Choice the file</label>
            </td>
        </tr>
        <tr>
            <td>
                <label for="age">Age</label>
            </td>
            <td>
                <input type="range" id="age" name="age" title="number">
            </td>
        </tr>
        <tr>
            <td>
        <input type="file" id="studies" name="studies" placeholder="chioce file">
        </td>
        </tr>
         <tr>
            <td><input type="submit" value="submit"></td>
            
            <td><input type="reset" value="reset"></td>
        </tr>


        </table>
        </center>
    </form>
</body>
</html>
