<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colors</title>
<style>
    div{
        border: 2px solid black;
        height:100px;
        width: 100px;
        margin: 10px;
    }
    /* name */
    .name{
        background-color: blueviolet;
    }
    /* hex */
    .hex{
        background-color: #27d274;
    }
    .rgb{
        background-color:rgb(55, 54, 105);
    }
    .rgba{
        background-color: rgba(228, 77, 89, 0.767);
    }
    .lin{
        background: linear-gradient(180deg,rgb(100,200,250),rgb(130,120,100),rgb(124,156,200));
    }
    .radial{
        background: radial-gradient(rgb(100,220,150),rgb(200,150,140),rgb(133, 116, 150));
    }
</style>
</head>
<body>
    <div class="name"></div>
    <div class="hex"></div>
    <div class="rgb"></div>
    <div class="rgba"></div>
    <div class="lin"></div>
    <div class="radial"></div>
</body>
</html>
