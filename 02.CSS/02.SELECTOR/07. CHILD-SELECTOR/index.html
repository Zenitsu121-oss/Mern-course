<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>child-selector</title>
    <style>
        #about h2+p{
            color: darkmagenta;
        }
    </style>
</head>
<body>
    <h2>child-selector</h2>
    <div id="about">
        <h2>child</h2>
     <p>Lorem ipsum dolor sit, amet consectetur adipisicing elit. Adipisci, obcaecati?</p>
     <p>Lorem ipsum dolor sit amet <small>consectetur adipisicing elit. Officia,</small> voluptatum.</p>
     </div>
     <div id="about">
        <h2>child</h2>
        <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Rerum, voluptas!</p>
     <ul>
        <li>RX</li>
        <li>RE</li>
        <li>RC</li>
        <li>DUKE</li>
     </ul>
     </div>
</body>
</html>
